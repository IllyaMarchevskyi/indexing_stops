<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Stop Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    html, body, #map { height: 100%; margin: 0; }
    .info {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.94);
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .title { font-weight: 700; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="info">
    <div class="title">Станція метро «Лук'янівська»</div>
    <div>POINT (30.4822267 50.4625391)</div>
  </div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([50.4625391, 30.4822267], 18);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    L.marker([50.4625391, 30.4822267]).addTo(map).bindPopup("\u0421\u0442\u0430\u043d\u0446\u0456\u044f \u043c\u0435\u0442\u0440\u043e \u00ab\u041b\u0443\u043a'\u044f\u043d\u0456\u0432\u0441\u044c\u043a\u0430\u00bb").openPopup();
  </script>
</body>
</html>
